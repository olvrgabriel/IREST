<app-header></app-header>
<main class="dashboard-layout">
  <div class="dashboard-header">
    <h1>Painel da Funerária - São João</h1>
    <button class="btn-dark">
      <span class="icon">+</span> Novo Serviço
    </button>
  </div>

  <div class="tabs-nav">
    <button class="tab-btn active">Serviços</button>
    <button class="tab-btn">Avaliações</button>
    <button class="tab-btn">Perfil</button>
    <button class="tab-btn">Relatórios</button>
  </div>

  <div class="card manage-card">
    <h3 class="card-title">Gerenciar Serviços</h3>

    <div class="service-list">
      <div class="service-item">
        <div class="service-info">
          <h4>Serviço Básico</h4>
          <span class="service-price">R$ 990</span>
        </div>
        <div class="service-actions">
          <span class="status-badge active">Ativo</span>
          <button class="icon-btn">Editar</button> <button class="icon-btn">Excluir</button>
        </div>
      </div>

      <div class="service-item">
        <div class="service-info">
          <h4>Serviço Completo</h4>
          <span class="service-price">R$ 1.450</span>
        </div>
        <div class="service-actions">
          <span class="status-badge active">Ativo</span>
          <button class="icon-btn">Editar</button>
          <button class="icon-btn">Excluir</button>
        </div>
      </div>

      <div class="service-item">
        <div class="service-info">
          <h4>Cremação</h4>
          <span class="service-price">R$ 1.200</span>
        </div>
        <div class="service-actions">
          <span class="status-badge inactive">Inativo</span>
          <button class="icon-btn">Editar</button>
          <button class="icon-btn">Excluir</button>
        </div>
      </div>
    </div>
  </div>
</main>
