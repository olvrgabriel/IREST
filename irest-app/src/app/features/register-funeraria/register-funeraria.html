<app-header></app-header>
<main class="auth-container">
  <div class="auth-card auth-card-wide">
    <h1>Cadastrar Funeraria</h1>
    <p class="auth-subtitle">Cadastre sua funeraria na plataforma IREST</p>

    <div *ngIf="error" class="auth-error">{{ error }}</div>

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-row">
        <div class="form-group">
          <label for="nome">Nome da Funeraria *</label>
          <input type="text" id="nome" [(ngModel)]="nome" name="nome"
                 placeholder="Nome da funeraria" required>
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" [(ngModel)]="email" name="email"
                 placeholder="contato@funeraria.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="cidade">Cidade *</label>
          <input type="text" id="cidade" [(ngModel)]="cidade" name="cidade"
                 placeholder="Cidade" required>
        </div>
        <div class="form-group">
          <label for="estado">Estado</label>
          <input type="text" id="estado" [(ngModel)]="estado" name="estado"
                 placeholder="UF">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" [(ngModel)]="telefone" name="telefone"
                 placeholder="(00) 00000-0000">
        </div>
        <div class="form-group">
          <label for="endereco">Endereco</label>
          <input type="text" id="endereco" [(ngModel)]="endereco" name="endereco"
                 placeholder="Endereco completo">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="senha">Senha *</label>
          <input type="password" id="senha" [(ngModel)]="senha" name="senha"
                 placeholder="Minimo 6 caracteres" required>
        </div>
        <div class="form-group">
          <label for="confirmarSenha">Confirmar Senha *</label>
          <input type="password" id="confirmarSenha" [(ngModel)]="confirmarSenha" name="confirmarSenha"
                 placeholder="Repita a senha" required>
        </div>
      </div>

      <button type="submit" class="btn-auth" [disabled]="loading">
        {{ loading ? 'Cadastrando...' : 'Cadastrar Funeraria' }}
      </button>
    </form>

    <p class="auth-link">
      Ja tem conta? <a routerLink="/login">Entrar</a> | <a routerLink="/cadastro">Cadastrar como usuario</a>
    </p>
  </div>
</main>
