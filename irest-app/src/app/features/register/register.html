<app-header></app-header>
<main class="auth-container">
  <div class="auth-card">
    <h1>Criar Conta</h1>
    <p class="auth-subtitle">Cadastre-se na plataforma IREST</p>

    <div *ngIf="error" class="auth-error">{{ error }}</div>

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" [(ngModel)]="nome" name="nome"
               placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" [(ngModel)]="senha" name="senha"
               placeholder="Minimo 6 caracteres" required>
      </div>

      <div class="form-group">
        <label for="confirmarSenha">Confirmar Senha</label>
        <input type="password" id="confirmarSenha" [(ngModel)]="confirmarSenha" name="confirmarSenha"
               placeholder="Repita a senha" required>
      </div>

      <div class="form-group">
        <label for="perguntaSeguranca">Pergunta de Seguranca</label>
        <select id="perguntaSeguranca" [(ngModel)]="perguntaSeguranca" name="perguntaSeguranca" required>
          <option value="" disabled>Selecione uma pergunta</option>
          <option *ngFor="let p of perguntas" [value]="p">{{ p }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="respostaSeguranca">Resposta de Seguranca</label>
        <input type="text" id="respostaSeguranca" [(ngModel)]="respostaSeguranca" name="respostaSeguranca"
               placeholder="Sua resposta" required>
      </div>

      <button type="submit" class="btn-auth" [disabled]="loading">
        {{ loading ? 'Criando conta...' : 'Criar Conta' }}
      </button>
    </form>

    <p class="auth-link">
      Ja tem conta? <a routerLink="/login">Entrar</a>
    </p>
    <p class="auth-link">
      E uma funeraria? <a routerLink="/cadastro-funeraria">Cadastre sua funeraria</a>
    </p>
  </div>
</main>
