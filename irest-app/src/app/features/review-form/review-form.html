<app-header></app-header>
<main class="review-container">
  <div *ngIf="loading" class="loading-message">
    Carregando funerária...
  </div>
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  <div *ngIf="success" class="success-message">
    {{ success }}
  </div>

  <ng-container *ngIf="!loading && funeraria">
    <div class="review-card" *ngIf="!success">
      <h1 class="review-title">Avaliar {{ funeraria.nome }}</h1>
      <p class="review-subtitle">Sua opinião é importante para ajudar outras famílias</p>

      <form (ngSubmit)="submitReview()">
        <div class="form-section">
          <label class="form-label">Como foi sua experiência?</label>
          <div class="stars-row main-stars">
            <span
              *ngFor="let s of [1,2,3,4,5]"
              class="star"
              [class.filled]="s <= review.nota"
              (click)="review.nota = s">&#9733;</span>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">Aspectos avaliados</label>
          <div class="aspect-row" *ngFor="let aspect of aspects">
            <span class="aspect-label">{{ aspect.label }}</span>
            <div class="stars-row">
              <span
                *ngFor="let s of [1,2,3,4,5]"
                class="star aspect-star"
                [class.filled]="s <= aspect.rating"
                (click)="aspect.rating = s">&#9733;</span>
            </div>
          </div>
        </div>

        <div class="form-section">
          <label class="form-label">Comentário (opcional)</label>
          <textarea
            name="comentario"
            [(ngModel)]="review.comentario"
            placeholder="Compartilhe sua experiência para ajudar outras famílias..."
            class="comment-textarea"
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit" [disabled]="submitting">
            {{ submitting ? 'Enviando...' : 'Enviar Avaliação' }}
          </button>
          <a [routerLink]="['/detalhes', funerariaId]" class="btn-cancel">Cancelar</a>
        </div>
      </form>
    </div>
  </ng-container>
</main>
