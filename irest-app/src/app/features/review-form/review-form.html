<app-header></app-header>
<main class="review-container">
  <div *ngIf="loading" class="loading-message">
    Carregando funerária...
  </div>
  <div *ngIf="error" class="error-message">
    {{ error }}
  </div>
  <div *ngIf="success" class="success-message">
    {{ success }}
  </div>

  <ng-container *ngIf="!loading && funeraria">
    <section class="review-header">
      <h1>Avaliar {{ funeraria.nome }}</h1>
      <p>Compartilhe sua experiência para ajudar outras pessoas</p>
    </section>

    <form class="review-form" (ngSubmit)="submitReview()" *ngIf="!success">
      <div class="form-group">
        <label>Classificação Geral ⭐</label>
        <div class="rating-input">
          <input type="radio" name="rating" value="1" id="star1" [(ngModel)]="review.nota" [value]="1">
          <label for="star1">⭐</label>
          <input type="radio" name="rating" value="2" id="star2" [(ngModel)]="review.nota" [value]="2">
          <label for="star2">⭐⭐</label>
          <input type="radio" name="rating" value="3" id="star3" [(ngModel)]="review.nota" [value]="3">
          <label for="star3">⭐⭐⭐</label>
          <input type="radio" name="rating" value="4" id="star4" [(ngModel)]="review.nota" [value]="4">
          <label for="star4">⭐⭐⭐⭐</label>
          <input type="radio" name="rating" value="5" id="star5" [(ngModel)]="review.nota" [value]="5" checked>
          <label for="star5">⭐⭐⭐⭐⭐</label>
        </div>
      </div>

      <div class="form-group">
        <label for="title">Título da Avaliação *</label>
        <input type="text" id="title" name="title" [(ngModel)]="review.titulo" placeholder="Ex: Excelente atendimento" required>
      </div>

      <div class="form-group">
        <label for="comment">Sua Avaliação *</label>
        <textarea id="comment" name="comment" [(ngModel)]="review.comentario" rows="6" placeholder="Descreva sua experiência..." required></textarea>
      </div>

      <div class="form-group">
        <label>Aspectos da Experiência</label>
        <div class="checkboxes">
          <label class="checkbox-label">
            <input type="checkbox" name="aspect" value="atendimento">
            <span>Atendimento atencioso</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="aspect" value="preco">
            <span>Preço justo</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="aspect" value="pontualidade">
            <span>Pontualidade</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="aspect" value="qualidade">
            <span>Qualidade dos serviços</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" name="aspect" value="local">
            <span>Limpeza e organização</span>
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-submit" [disabled]="submitting">
          {{ submitting ? 'Enviando...' : 'Enviar Avaliação' }}
        </button>
        <a [routerLink]="['/detalhes', funerariaId]" class="btn-cancel">Cancelar</a>
      </div>
    </form>
  </ng-container>
</main>
