<app-header></app-header>
<main class="auth-container">
  <div class="auth-card">
    <h1>Recuperar Senha</h1>

    <div *ngIf="error" class="auth-error">{{ error }}</div>
    <div *ngIf="success" class="auth-success">{{ success }}</div>

    <!-- Step 1: Informar email -->
    <ng-container *ngIf="step === 'email'">
      <p class="auth-subtitle">Informe seu email para recuperar a senha</p>
      <form (ngSubmit)="buscarPergunta()" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" [(ngModel)]="email" name="email"
                 placeholder="seu@email.com" required>
        </div>

        <button type="submit" class="btn-auth" [disabled]="loading">
          {{ loading ? 'Buscando...' : 'Continuar' }}
        </button>
      </form>
    </ng-container>

    <!-- Step 2: Responder pergunta e definir nova senha -->
    <ng-container *ngIf="step === 'resposta'">
      <p class="auth-subtitle">Responda a pergunta de seguranca para redefinir sua senha</p>

      <div class="pergunta-box">
        <strong>{{ pergunta }}</strong>
      </div>

      <form (ngSubmit)="redefinirSenha()" class="auth-form">
        <div class="form-group">
          <label for="resposta">Sua Resposta</label>
          <input type="text" id="resposta" [(ngModel)]="resposta" name="resposta"
                 placeholder="Digite sua resposta" required>
        </div>

        <div class="form-group">
          <label for="novaSenha">Nova Senha</label>
          <input type="password" id="novaSenha" [(ngModel)]="novaSenha" name="novaSenha"
                 placeholder="Minimo 6 caracteres" required>
        </div>

        <div class="form-group">
          <label for="confirmarSenha">Confirmar Nova Senha</label>
          <input type="password" id="confirmarSenha" [(ngModel)]="confirmarSenha" name="confirmarSenha"
                 placeholder="Repita a nova senha" required>
        </div>

        <button type="submit" class="btn-auth" [disabled]="loading">
          {{ loading ? 'Redefinindo...' : 'Redefinir Senha' }}
        </button>
      </form>
    </ng-container>

    <p class="auth-link">
      Lembrou a senha? <a routerLink="/login">Voltar ao login</a>
    </p>
  </div>
</main>
