<app-header></app-header>
<main class="auth-container">
  <div class="auth-card">
    <h1>Entrar</h1>
    <p class="auth-subtitle">Acesse sua conta IREST</p>

    <div *ngIf="error" class="auth-error">{{ error }}</div>

    <form (ngSubmit)="login()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" [(ngModel)]="senha" name="senha"
               placeholder="Sua senha" required>
      </div>

      <button type="submit" class="btn-auth" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-link">
      Nao tem conta? <a routerLink="/cadastro">Cadastre-se</a>
    </p>
  </div>
</main>
