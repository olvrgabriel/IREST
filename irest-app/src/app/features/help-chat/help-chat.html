<app-header></app-header>
<main class="page-wrapper">
  <div class="chat-card">
    <div class="chat-header">
      <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <h1>Central de Ajuda - Chat</h1>
    </div>

    <div class="chat-area" #chatArea>
      <div
        *ngFor="let msg of messages"
        class="message-row"
        [class.user-row]="msg.sender === 'user'"
      >
        <div
          class="message-bubble"
          [class.user-bubble]="msg.sender === 'user'"
        >
          {{ msg.text }}
        </div>
      </div>
    </div>

    <div class="suggestions-section">
      <span class="suggestions-label">Sugestões rápidas:</span>
      <div class="suggestions-container">
        <button
          *ngFor="let suggestion of suggestions"
          class="suggestion-btn"
          (click)="sendSuggestion(suggestion)"
        >
          {{ suggestion }}
        </button>
      </div>
    </div>

    <div class="input-row">
      <input
        type="text"
        class="chat-input"
        placeholder="Digite sua mensagem..."
        [(ngModel)]="userInput"
        (keydown.enter)="sendMessage()"
      />
      <button class="send-btn" (click)="sendMessage()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
    </div>
  </div>
</main>
